name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.1). Required for manual runs.'
        required: false
        default: ''

env:
  TAG_NAME: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & Test
    if: github.event_name == 'push' || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: make deps

      - name: Lint
        run: make lint

      - name: Generate third-party notices
        run: make generate-third-party

      - name: Unit tests
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build-installer:
    name: Build Installer
    if: github.event_name == 'push' || inputs.tag != ''
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        shell: bash
        run: make deps

      - name: Fetch ffmpeg
        shell: bash
        run: make fetch-ffmpeg

      - name: Run unit tests
        shell: bash
        run: make test

      - name: Build installer
        shell: bash
        run: make installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StormFuse-installer
          path: dist/StormFuse-Setup-*.exe

  release:
    name: Create Release
    if: github.event_name == 'push' || inputs.tag != ''
    needs: [lint-and-test, build-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: StormFuse-installer
          path: .
          merge-multiple: true

      - name: List release assets
        run: find . -name "StormFuse-Setup-*.exe" -print

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            **/StormFuse-Setup-*.exe
