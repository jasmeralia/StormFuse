name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.1). Required for manual runs.'
        required: false
        default: ''

env:
  TAG_NAME: ${{ inputs.tag || github.ref_name }}

permissions:
  actions: read
  contents: write

jobs:
  lint-and-test:
    name: Lint & Test
    if: github.event_name == 'push' || inputs.tag != ''
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: make deps

      - name: Lint
        run: make lint

      - name: Generate third-party notices
        run: make generate-third-party

      - name: Unit tests
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: ${{ env.CODECOV_TOKEN != '' }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          verbose: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v6
        if: ${{ env.CODECOV_TOKEN != '' && !cancelled() }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results
          verbose: true
          fail_ci_if_error: false

  build-installer:
    name: Build Installer
    if: github.event_name == 'push' || inputs.tag != ''
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        shell: bash
        run: make deps

      - name: Fetch ffmpeg
        shell: bash
        run: make fetch-ffmpeg

      - name: Generate third-party notices
        shell: bash
        run: make generate-third-party

      - name: Run unit tests
        shell: bash
        run: make test

      - name: Ensure NSIS
        shell: pwsh
        run: |
          $nsisX86 = "${env:ProgramFiles(x86)}\\NSIS\\makensis.exe"
          $nsisX64 = "${env:ProgramFiles}\\NSIS\\makensis.exe"
          if ((Test-Path $nsisX86) -or (Test-Path $nsisX64)) {
            Write-Host "NSIS already installed"
          } else {
            choco install nsis -y
          }

      - name: Add NSIS to PATH
        shell: pwsh
        run: |
          $nsisDir = "${env:ProgramFiles(x86)}\\NSIS"
          if (-not (Test-Path $nsisDir)) {
            $nsisDir = "${env:ProgramFiles}\\NSIS"
          }
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: bash
        run: make installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: StormFuse-installer
          path: dist/StormFuse-Setup-*.exe

  release:
    name: Create Release
    if: github.event_name == 'push' || inputs.tag != ''
    needs: [lint-and-test, build-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Download build artifacts
        run: gh run download "$GITHUB_RUN_ID" --name StormFuse-installer --dir .
        env:
          GH_TOKEN: ${{ github.token }}

      - name: List release assets
        run: find . -name "StormFuse-Setup-*.exe" -print

      - name: Generate release notes from changelog
        id: release_notes
        run: |
          PREV_TAG=$(python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ.get("GITHUB_REPOSITORY")
          current = os.environ.get("CURRENT_TAG", "")
          url = f"https://api.github.com/repos/{repo}/releases?per_page=20"

          tag = ""
          try:
              with urllib.request.urlopen(url, timeout=10) as resp:
                  data = json.load(resp)
              for release in data:
                  if release.get("draft"):
                      continue
                  rel_tag = release.get("tag_name", "")
                  if rel_tag and rel_tag != current:
                      tag = rel_tag
                      break
          except Exception:
              tag = ""

          if not tag:
              tags = os.popen("git tag --sort=-v:refname").read().strip().splitlines()
              for rel_tag in tags:
                  if rel_tag and rel_tag != current:
                      tag = rel_tag
                      break

          print(tag)
          PY
          )
          CURRENT_TAG="${{ env.TAG_NAME }}"

          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION=$(PREV_TAG="$PREV_TAG" CURRENT_TAG="$CURRENT_TAG" python scripts/release_notes.py)
          fi

          {
            echo "body<<RELEASE_EOF"
            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "## What's Changed"
              echo ""
              echo "$CHANGELOG_SECTION"
              echo ""
            fi
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          CURRENT_TAG: ${{ env.TAG_NAME }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            **/StormFuse-Setup-*.exe
