AWSTemplateFormatVersion: '2010-09-09'
Description: >
  StormFuse - Log Upload Backend.
  Deploys Lambda, API Gateway (HTTP API) with custom domain
  stormfuse.jasmer.tools, S3 log storage, and SES email notifications.

Parameters:
  DomainName:
    Type: String
    Default: stormfuse.jasmer.tools
    Description: Custom domain for the API Gateway

  CertificateArn:
    Type: String
    Description: >
      ARN of an ACM certificate for stormfuse.jasmer.tools.
      Must be in the same region as this stack.

  NotifyEmail:
    Type: String
    Default: morgan@windsofstorm.net
    Description: Email address to receive error report notifications

  SenderEmail:
    Type: String
    Default: morgan@windsofstorm.net
    Description: Email address used as the SES sender (must be verified)

  LogRetentionDays:
    Type: Number
    Default: 30
    Description: Days before uploaded log files are automatically deleted from S3

Resources:
  # ── S3 Bucket for log storage ──────────────────────────────────────
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Account-scoped name to avoid global conflicts
      BucketName: !Sub stormfuse-logs-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: !Ref LogRetentionDays
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  # ── IAM Role for Lambda ────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub StormFuse-LogUpload-Lambda-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt LogsBucket.Arn
                  - !Sub '${LogsBucket.Arn}/*'

  # ── Lambda Function ────────────────────────────────────────────────
  LogUploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub StormFuse-LogUpload-${AWS::StackName}
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          BUCKET_NAME: !Ref LogsBucket
          NOTIFY_EMAIL: !Ref NotifyEmail
          SENDER_EMAIL: !Ref SenderEmail
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via deploy.sh after stack creation
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': '{"success": true, "message": "placeholder"}'
              }

  # ── API Gateway (HTTP API) ─────────────────────────────────────────
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub StormFuse-LogUpload-API-${AWS::StackName}
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # Lambda integration
  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LogUploadFunction.Arn
      PayloadFormatVersion: '2.0'

  # POST /logs/upload — init, returns presigned S3 PUT URLs
  LogUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /logs/upload
      Target: !Sub integrations/${HttpApiIntegration}

  # POST /logs/complete — signal completion, triggers email
  LogsCompleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /logs/complete
      Target: !Sub integrations/${HttpApiIntegration}

  # Default stage with auto-deploy
  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  # Permission for API Gateway to invoke Lambda
  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LogUploadFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*

  # ── Custom Domain ──────────────────────────────────────────────────
  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL

  # Map custom domain to the API
  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    DependsOn: HttpApiStage
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiDomainName
      Stage: $default

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL (before custom domain)
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com

  CustomDomainUrl:
    Description: Custom domain base URL
    Value: !Sub https://${DomainName}

  CustomDomainTarget:
    Description: CNAME target for the custom domain (create DNS record manually)
    Value: !GetAtt ApiDomainName.RegionalDomainName

  CustomDomainHostedZoneId:
    Description: API Gateway hosted zone ID (for reference)
    Value: !GetAtt ApiDomainName.RegionalHostedZoneId

  LambdaFunctionArn:
    Description: ARN of the log upload Lambda function
    Value: !GetAtt LogUploadFunction.Arn

  LogsBucketName:
    Description: S3 bucket name for log file storage
    Value: !Ref LogsBucket
