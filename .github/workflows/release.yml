name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but do not publish)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: make deps

      - name: Fetch ffmpeg
        shell: bash
        run: make fetch-ffmpeg

      - name: Run unit tests
        shell: bash
        run: make test

      - name: Build installer
        shell: bash
        run: make installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StormFuse-installer
          path: dist/StormFuse-Setup-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" dist/StormFuse-Setup-*.exe --generate-notes
